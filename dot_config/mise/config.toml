# [tasks.sync-dotfiles]
# shell = "powershell"
# run = "chezmoi managed | Where-Object { -not (Test-Path (Join-Path $HOME $_) -PathType Container) } | ForEach-Object { chezmoi re-add (Join-Path $HOME $_) }; cd $HOME/.local/share/chezmoi; git add .; git commit -m \"Sync\"; git push"

[tasks.sync-dotfiles]
shell = "powershell"
run = '''
Write-Host '===== BEFORE re-add (chezmoi diff) =====' -ForegroundColor Cyan

# Get raw diff
$before = chezmoi diff

# Extract changed file paths (unique)
$changedFiles = ($before |
    Select-String -Pattern '^diff --git a/(.+?) b/' |
    ForEach-Object {
        ($_ -replace '^diff --git a/', '') -replace ' b/.*$', ''
    } | Sort-Object -Unique)

# Show changed file list
if ($changedFiles.Count -gt 0) {
    Write-Host 'Changed files:' -ForegroundColor Green
    $changedFiles | ForEach-Object { Write-Host (' - ' + $_) }
} else {
    Write-Host 'No changes in HOME. Skip re-add/commit/push.' -ForegroundColor Yellow
    exit 0
}

# re-add
foreach ($f in (chezmoi managed)) {
    $path = Join-Path $HOME $f
    if (-not (Test-Path $path -PathType Container)) {
        chezmoi re-add $path
    }
}

Write-Host '===== AFTER re-add (git diff) =====' -ForegroundColor Cyan
git -C "$HOME/.local/share/chezmoi" diff --color=always

if (git -C "$HOME/.local/share/chezmoi" diff --quiet) {
    Write-Host 'No changes to source state. Skip commit/push.' -ForegroundColor Yellow
    exit 0
}

cd "$HOME/.local/share/chezmoi"
git add .
git commit -m 'Sync'
git push
'''
