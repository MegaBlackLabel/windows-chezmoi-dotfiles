# [tasks.sync-dotfiles]
# shell = "powershell"
# run = "chezmoi managed | Where-Object { -not (Test-Path (Join-Path $HOME $_) -PathType Container) } | ForEach-Object { chezmoi re-add (Join-Path $HOME $_) }; cd $HOME/.local/share/chezmoi; git add .; git commit -m \"Sync\"; git push"

[tasks.sync-dotfiles]
shell = "powershell"
run = '''
# Get raw diff
$before = chezmoi diff

# Extract diff hunks
$diffLines = $before -split "`n"

# Extract changed file paths
$files = ($diffLines |
    Select-String -Pattern '^diff --git a/(.+?) b/' |
    ForEach-Object {
        ($_ -replace '^diff --git a/', '') -replace ' b/.*$', ''
    } | Sort-Object -Unique)

# Classify changes
$added = @()
$deleted = @()
$modified = @()

foreach ($file in $files) {
    $fileDiff = $diffLines | Select-String -Pattern $file -Context 0,50

    $plus = ($fileDiff | Select-String -Pattern '^\+[^+]').Count
    $minus = ($fileDiff | Select-String -Pattern '^\-[^-]').Count

    if ($plus -gt 0 -and $minus -eq 0) {
        $added += $file
    } elseif ($minus -gt 0 -and $plus -eq 0) {
        $deleted += $file
    } else {
        $modified += $file
    }
}

# Output
if ($files.Count -eq 0) {
    Write-Host 'No changes in HOME. Skip re-add/commit/push.' -ForegroundColor Yellow
    exit 0
}

foreach ($f in $added)   { Write-Host (' + ' + $f) -ForegroundColor Green }
foreach ($f in $deleted) { Write-Host (' - ' + $f) -ForegroundColor Red }
foreach ($f in $modified){ Write-Host (' * ' + $f) -ForegroundColor Yellow }

# re-add
foreach ($f in (chezmoi managed)) {
    $path = Join-Path $HOME $f
    if (-not (Test-Path $path -PathType Container)) {
        chezmoi re-add $path
    }
}

# AFTER re-add diff (git)
git -C "$HOME/.local/share/chezmoi" diff --color=always

if (git -C "$HOME/.local/share/chezmoi" diff --quiet) {
    Write-Host 'No changes to source state. Skip commit/push.' -ForegroundColor Yellow
    exit 0
}

cd "$HOME/.local/share/chezmoi"
git add .
git commit -m 'Sync'
git push
'''
